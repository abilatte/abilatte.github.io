baseURL: "https://abilatte.github.io/"
title: 阿比拿铁的博客
theme: hugo-theme-stack
defaultContentLanguage: zh
hasCJKLanguage: true
timeZone: Asia/Shanghai

languages:
  zh:
    label: "中文"
    locale: zh-CN
    title: 阿比拿铁的博客
    weight: 1

pagination:
  pagerSize: 10

permalinks:
  post: /:slug/
  page: /:slug/

params:
  mainSections:
    - posts
  featuredImageField: image
  rssFullContent: true

  footer:
    since: 2026
    customText: ""

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02"

  sidebar:
    compact: false
    subtitle: "一个新人程序员的练级日志。"
    avatar: "img/avatar.png"

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false

  colorScheme:
    toggle: true
    default: auto

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  comments:
    enabled: false

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: -100
      params:
        icon: home
        newTab: false

  social:
    - identifier: github
      name: GitHub
      url: "https://github.com/abilatte"
      params:
        icon: brand-github

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    tabWidth: 4
