baseURL: "https://abilatte.github.io/"
title: 阿比拿铁的博客
theme: PaperMod
languageCode: zh-cn
defaultContentLanguage: zh
hasCJKLanguage: true
timeZone: Asia/Shanghai
enableRobotsTXT: true

pagination:
  pagerSize: 10

minify:
  disableXML: true

outputs:
  home: [HTML, RSS, JSON]

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40

params:
  env: production
  defaultTheme: auto
  DateFormat: "2006-01-02"
  ShowReadingTime: true
  ShowWordCount: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowShareButtons: false
  homeInfoParams:
    Title: "阿比拿铁的博客 👋"
    Content: >
      一个新人程序员的练级日志。
  socialIcons:
    - name: github
      url: "https://github.com/abilatte"
    - name: rss
      url: "/index.xml"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    minMatchCharLength: 1
    keys: ["title", "permalink", "summary", "content"]
